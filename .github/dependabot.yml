version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    reviewers:
      - danieljustus
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-dependencies:
        patterns:
          - "*"
    ignore:
      # Deferred: transitive via go-git — tracked in deferred-deps-check.yml
      - dependency-name: "github.com/ProtonMail/go-crypto"
      # Deferred: transitive via groupcache — tracked in deferred-deps-check.yml
      - dependency-name: "github.com/golang/protobuf"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    reviewers:
      - danieljustus
    commit-message:
      prefix: "chore(ci)"
