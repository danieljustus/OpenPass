name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        run: GOWORK=off go test -v -race -timeout=30m ./...

      - name: Verify release dependency graph
        run: |
          clipboard_dir="$(GOWORK=off go list -f '{{ .Dir }}' github.com/atotto/clipboard)"
          clipboard_version="$(GOWORK=off go list -m -f '{{ .Version }}' github.com/atotto/clipboard)"
          if [ "$clipboard_version" != "v0.1.4" ]; then
            echo "expected github.com/atotto/clipboard v0.1.4, got $clipboard_version"
            exit 1
          fi
          case "$clipboard_dir" in
            "$PWD"/clipboardpkg|"$PWD"/clipboardpkg/*)
              echo "release dependency graph resolved clipboard to local workspace stub: $clipboard_dir"
              exit 1
              ;;
          esac

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26'
          go-package: ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, govulncheck]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOWORK: off

  smoke-test-linux:
    name: Smoke Test (Linux amd64)
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download Linux archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/openpass_${VERSION}_linux_amd64.tar.gz"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/openpass_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sha256sum -c "openpass_${VERSION}_checksums.txt" --ignore-missing

      - name: Extract and install
        run: |
          tar xzf openpass_*.tar.gz
          sudo mv openpass_*/openpass /usr/local/bin/openpass
          openpass version

      - name: Smoke test - help output
        run: openpass --help | head -5

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          OPENPASS_VAULT="$TMPDIR/test-vault" openpass init --non-interactive
          rm -rf "$TMPDIR"

  smoke-test-deb:
    name: Smoke Test (deb package)
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download deb package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/openpass_${VERSION}_linux_amd64.deb"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/openpass_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sha256sum -c "openpass_${VERSION}_checksums.txt" --ignore-missing

      - name: Install deb package
        run: sudo dpkg -i openpass_*.deb

      - name: Verify package installed
        run: 'dpkg -s openpass | grep "Status: install ok installed"'

      - name: Smoke test - version
        run: openpass version

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          OPENPASS_VAULT="$TMPDIR/test-vault" openpass init --non-interactive
          rm -rf "$TMPDIR"

  smoke-test-macos:
    name: Smoke Test (macOS amd64)
    runs-on: macos-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download macOS archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/openpass_${VERSION}_darwin_amd64.tar.gz"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/openpass_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          shasum -a 256 -c "openpass_${VERSION}_checksums.txt" --ignore-missing

      - name: Extract and install
        run: |
          tar xzf openpass_*.tar.gz
          sudo mv openpass_*/openpass /usr/local/bin/openpass
          openpass version

      - name: Smoke test - help output
        run: openpass --help | head -5

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          OPENPASS_VAULT="$TMPDIR/test-vault" openpass init --non-interactive
          rm -rf "$TMPDIR"
