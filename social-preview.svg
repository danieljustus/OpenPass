<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="url(#accent)" opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="url(#accent)" opacity="0.03"/>
  
  <!-- Lock icon -->
  <g transform="translate(540, 180)" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="20" y="40" width="80" height="60" rx="8"/>
    <path d="M35 40V25a25 25 0 0 1 50 0v15"/>
    <circle cx="60" cy="70" r="8" fill="url(#accent)" stroke="none"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="-2">
    OpenPass
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Modern CLI Password Manager
  </text>
  
  <!-- Features -->
  <text x="600" y="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#64748b" text-anchor="middle">
    age Encryption • MCP Server • OS Keyring • TOTP • Git Sync
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="520" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  
  <!-- Version badge -->
  <rect x="540" y="550" width="120" height="32" rx="16" fill="url(#accent)" opacity="0.15"/>
  <text x="600" y="572" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#3b82f6" text-anchor="middle">
    v1.1.0
  </text>
</svg>
